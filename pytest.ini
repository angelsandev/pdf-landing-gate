[pytest]
# Directorio donde están los tests de Python
testpaths = tests/backend
pythonpath = .

# Patrones para encontrar archivos de test
python_files = test_*.py
python_functions = test_*
python_classes = Test*

# Ignorar directorios que no contienen tests de Python
norecursedirs = node_modules .astro .vercel dist

# Configuración de salida (más limpia y con colores)
addopts = -v --tb=short

# Marcadores personalizados (por ejemplo: para tests que requieren Redis)
markers =
    integration: tests que requieren servicios externos (Redis, API)
    unit: tests de lógica pura
